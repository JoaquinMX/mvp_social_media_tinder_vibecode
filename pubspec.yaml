name: group_swipe
description: Group-based activity discovery app with swipe matchmaking.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  hooks_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  http: ^1.2.0
  maplibre_gl: ^0.17.0
  google_fonts: ^6.1.0
  equatable: ^2.0.5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.10
  freezed: ^2.4.7
  json_serializable: ^6.7.1

dependency_overrides:
  analyzer: ^6.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
